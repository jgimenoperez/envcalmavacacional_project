<div class="lodgify-box">
  <div class="lodgify-form">

    <div class="date-range-wrapper">
      <div class="date-range">
        <div class="date-field" onclick="toggleCalendar()">
          <span class="date-label">Llegada</span>
          <span id="checkinText" class="date-value empty">dd/mm/aaaa</span>
        </div>
        <div class="date-field" onclick="toggleCalendar()">

        <button class="clear-dates" id="clearDates" onclick="clearDates(event)" title="Limpiar fechas">✕</button>

<script>
const state = {
  adults: 1,
  children: 0,
  infants: 0,
  pets: 0
};

function toggleGuests() {
  const d = document.getElementById('guestsDropdown');
  d.style.display = d.style.display === 'block' ? 'none' : 'block';
  updateText();
}

function changeGuests(type, delta) {
  if (type === 'adults' && state.adults + delta < 1) return;
  if (state[type] + delta < 0) return;

  state[type] += delta;
  document.getElementById(type).innerText = state[type];
  updateText();
}

function updateText() {
  let t = `${state.adults} adulto${state.adults > 1 ? 's' : ''}`;
  if (state.children) t += `, ${state.children} niño${state.children > 1 ? 's' : ''}`;
  if (state.infants) t += `, ${state.infants} bebé${state.infants > 1 ? 's' : ''}`;
  if (state.pets) t += `, ${state.pets} mascota${state.pets > 1 ? 's' : ''}`;
  document.getElementById('guestsText').innerText = t;
}

let calStartDate = null;
let calEndDate = null;
let calHoverDate = null;
let calViewYear = new Date().getFullYear();
let calViewMonth = new Date().getMonth();

function toggleCalendar() {
  const dropdown = document.getElementById('calendarDropdown');
  if (dropdown.classList.contains('active')) return;
  dropdown.classList.add('active');
  renderCalendar();
  setTimeout(() => {
    document.addEventListener('click', closeCalendarOnOutsideClick);
  }, 0);
}

function closeCalendarOnOutsideClick(e) {
  const cal = document.getElementById('calendarDropdown');
  const range = document.querySelector('.date-range');
  if (!cal.contains(e.target) && !range.contains(e.target)) {
    cal.classList.remove('active');
    document.removeEventListener('click', closeCalendarOnOutsideClick);
  }
}

function renderCalendar() {
  const dropdown = document.getElementById('calendarDropdown');
  const months = [];

  for (let i = 0; i < 2; i++) {
    const y = calViewYear + Math.floor((calViewMonth + i) / 12);
    const m = (calViewMonth + i) % 12;
    months.push(renderMonth(y, m));
  }

  dropdown.innerHTML = `
    <div class="cal-header">
      <button onclick="changeMonth(-1)">←</button>
      <div class="cal-months">${months.join('')}</div>
      <button onclick="changeMonth(1)">→</button>
    </div>
  `;
}

function renderMonth(year, month) {
  const names = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
  let firstDay = new Date(year, month, 1).getDay();
  firstDay = firstDay === 0 ? 6 : firstDay - 1;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  let html = `<div class="cal-month"><div class="cal-month-title">${names[month]} de ${year}</div><div class="cal-grid">`;

  const dayNames = ['lun', 'mar', 'mié', 'jue', 'vie', 'sáb', 'dom'];
  dayNames.forEach(d => html += `<div class="cal-day-header">${d}</div>`);

  for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';

  for (let day = 1; day <= daysInMonth; day++) {
    const date = new Date(year, month, day);
    date.setHours(0, 0, 0, 0);
    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

    let classes = 'cal-day';
    if (date < today) classes += ' disabled';
    else {
      if (calStartDate && calEndDate) {
        const start = new Date(calStartDate);
        const end = new Date(calEndDate);
        start.setHours(0, 0, 0, 0);
        end.setHours(0, 0, 0, 0);
        if (dateStr === calStartDate) classes += ' selected range-start';
        else if (dateStr === calEndDate) classes += ' selected range-end';
        else if (date > start && date < end) classes += ' in-range';
      } else if (calStartDate && !calEndDate) {
        if (dateStr === calStartDate) classes += ' selected';
      }
    }

    const click = date < today ? '' : `onclick="event.stopPropagation(); selectDate('${dateStr}')"`;
    html += `<div class="${classes}" ${click}>${day}</div>`;
  }

  html += '</div></div>';
  return html;
}

function changeMonth(delta) {
  calViewMonth += delta;
  if (calViewMonth > 11) {
    calViewMonth = 0;
    calViewYear++;
  } else if (calViewMonth < 0) {
    calViewMonth = 11;
    calViewYear--;
  }
  renderCalendar();
}

function selectDate(dateStr) {
  let shouldClose = false;

  if (!calStartDate) {
    calStartDate = dateStr;
  } else if (!calEndDate) {
    if (dateStr < calStartDate) {
      calEndDate = calStartDate;
      calStartDate = dateStr;
    } else if (dateStr === calStartDate) {
      return;
    } else {
      calEndDate = dateStr;
    }
    shouldClose = true;
  } else {
    calStartDate = dateStr;
    calEndDate = null;
  }

  updateCalendarInputs();
  renderCalendar();

  if (shouldClose) {
    document.getElementById('calendarDropdown').classList.remove('active');
    document.removeEventListener('click', closeCalendarOnOutsideClick);
  }
}

function formatDateShort(dateStr) {
  const months = ['ene', 'feb', 'mar', 'abr', 'may', 'jun', 'jul', 'ago', 'sep', 'oct', 'nov', 'dic'];
  const [y, m, d] = dateStr.split('-');
  return `${parseInt(d)} ${months[parseInt(m) - 1]} ${y}`;
}

function updateCalendarInputs() {
  const checkinEl = document.getElementById('checkinText');
  const checkoutEl = document.getElementById('checkoutText');
  const clearBtn = document.getElementById('clearDates');

  if (calStartDate) {
    checkinEl.innerText = formatDateShort(calStartDate);
    checkinEl.classList.remove('empty');
  } else {
    checkinEl.innerText = 'dd/mm/aaaa';
    checkinEl.classList.add('empty');
  }

  if (calEndDate) {
    checkoutEl.innerText = formatDateShort(calEndDate);
    checkoutEl.classList.remove('empty');
  } else {
    checkoutEl.innerText = 'dd/mm/aaaa';
    checkoutEl.classList.add('empty');
  }

  if (calStartDate && calEndDate) {
    clearBtn.classList.add('visible');
  } else {
    clearBtn.classList.remove('visible');
  }
}

function clearDates(e) {
  e.stopPropagation();
  calStartDate = null;
  calEndDate = null;
  updateCalendarInputs();
  renderCalendar();
}

function search() {
  const params = {
    adults: parseInt(state.adults) || 1,
    children: parseInt(state.children) || 0,
    infants: parseInt(state.infants) || 0,
    pets: parseInt(state.pets) || 0,
    sort: "price"
  };

  if (calStartDate) {
    params.arrival = calStartDate.replace(/-/g, '');
  }
  if (calEndDate) {
    params.departure = calEndDate.replace(/-/g, '');
  }

  const url = new URL("https://alvaro--garcia.lodgify.com/es/propiedades/");
  url.search = new URLSearchParams(params).toString();
  window.open(url, "_blank");
}
</script>

  /* ─── Guests ────────────────────────────────────────────── */

    const toggle = document.getElementById('guestsToggle');
    const isOpen = dropdown.classList.contains('open');

    if (isOpen) {
      dropdown.classList.remove('open');
      toggle.classList.remove('open');
      toggle.setAttribute('aria-expanded', 'false');
    } else {
      dropdown.classList.add('open');
      toggle.classList.add('open');
      toggle.setAttribute('aria-expanded', 'true');
      // Close when clicking outside
      setTimeout(() => {
        document.addEventListener('click', closeGuestsOutside, { once: true });
      }, 0);
    }
    updateGuestsText();
  }

  function closeGuestsOutside(e) {
    const wrapper = document.querySelector('.ec-guests');
    if (!wrapper.contains(e.target)) {
      document.getElementById('guestsDropdown').classList.remove('open');
      document.getElementById('guestsToggle').classList.remove('open');
      document.getElementById('guestsToggle').setAttribute('aria-expanded', 'false');
    }
  }

  function changeGuests(type, delta) {
    if (type === 'adults' && state.adults + delta < 1) return;
    if (state[type] + delta < 0) return;
    state[type] += delta;
    document.getElementById(type).innerText = state[type];

    // Dim/disable the minus button when at minimum
    updateGuestsText();
  }

  function updateGuestsText() {
    let t = `${state.adults} adulto${state.adults > 1 ? 's' : ''}`;
    if (state.children) t += `, ${state.children} niño${state.children > 1 ? 's' : ''}`;
    if (state.infants) t += `, ${state.infants} bebé${state.infants > 1 ? 's' : ''}`;
    if (state.pets) t += `, ${state.pets} mascota${state.pets > 1 ? 's' : ''}`;
    document.getElementById('guestsText').innerText = t;
  }

  /* ─── Calendar ──────────────────────────────────────────── */
  let calStartDate = null;
  let calEndDate = null;
  let calViewYear = new Date().getFullYear();
  let calViewMonth = new Date().getMonth();

  function toggleCalendar() {
    const dropdown = document.getElementById('calendarDropdown');
    if (dropdown.classList.contains('active')) return;
    dropdown.classList.add('active');
    renderCalendar();
    setTimeout(() => {
      document.addEventListener('click', closeCalendarOutside);
    }, 0);
  }

  function closeCalendarOutside(e) {
    const cal = document.getElementById('calendarDropdown');
    const range = document.querySelector('.ec-date-range');
    if (!cal.contains(e.target) && !range.contains(e.target)) {
      cal.classList.remove('active');
      document.removeEventListener('click', closeCalendarOutside);
    }
  }

  function renderCalendar() {
    const dropdown = document.getElementById('calendarDropdown');
    const isMobile = window.innerWidth <= 560;
    const monthCount = isMobile ? 1 : 2;
    const months = [];

    for (let i = 0; i < monthCount; i++) {
      const y = calViewYear + Math.floor((calViewMonth + i) / 12);
      const m = (calViewMonth + i) % 12;
      months.push(renderMonth(y, m));
    }

    dropdown.innerHTML = `
      <div class="cal-header">
        <div class="cal-nav-btn" onclick="event.stopPropagation(); changeMonth(-1)" role="button" tabindex="0" aria-label="Mes anterior">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </div>
        <div class="cal-months">${months.join('')}</div>
        <div class="cal-nav-btn" onclick="event.stopPropagation(); changeMonth(1)" role="button" tabindex="0" aria-label="Mes siguiente">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
      </div>
    `;
  }

  function renderMonth(year, month) {
    const names = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
    let firstDay = new Date(year, month, 1).getDay();
    firstDay = firstDay === 0 ? 6 : firstDay - 1;
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    let html = `<div class="cal-month"><div class="cal-month-title">${names[month]} ${year}</div><div class="cal-grid">`;

    const dayNames = ['Lu', 'Ma', 'Mi', 'Ju', 'Vi', 'Sa', 'Do'];
    dayNames.forEach(d => html += `<div class="cal-day-header">${d}</div>`);

    for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';

    for (let day = 1; day <= daysInMonth; day++) {
      const date = new Date(year, month, day);
      date.setHours(0, 0, 0, 0);
      const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

      let classes = 'cal-day';
      if (date < today) {
        classes += ' disabled';
      } else {
        if (calStartDate && calEndDate) {
          const start = new Date(calStartDate); start.setHours(0, 0, 0, 0);
          const end = new Date(calEndDate); end.setHours(0, 0, 0, 0);
          if (dateStr === calStartDate) classes += ' selected range-start';
          else if (dateStr === calEndDate) classes += ' selected range-end';
          else if (date > start && date < end) classes += ' in-range';
        } else if (calStartDate && !calEndDate) {
          if (dateStr === calStartDate) classes += ' selected';
        }
      }

      const clickAttr = date < today ? '' : `onclick="event.stopPropagation(); selectDate('${dateStr}')"`;
      html += `<div class="${classes}" ${clickAttr} ${date < today ? '' : `role="button" tabindex="0" aria-label="${day} de ${names[month]}"`}>${day}</div>`;
    }

    html += '</div></div>';
    return html;
  }

  function changeMonth(delta) {
    calViewMonth += delta;
    if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
    else if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
    renderCalendar();
  }

  function selectDate(dateStr) {
    let shouldClose = false;

    if (!calStartDate) {
      calStartDate = dateStr;
    } else if (!calEndDate) {
      if (dateStr < calStartDate) {
        calEndDate = calStartDate;
        calStartDate = dateStr;
      } else if (dateStr === calStartDate) {
        return;
      } else {
        calEndDate = dateStr;
      }
      shouldClose = true;
    } else {
      calStartDate = dateStr;
      calEndDate = null;
    }

    updateCalendarInputs();
    renderCalendar();

    if (shouldClose) {
      document.getElementById('calendarDropdown').classList.remove('active');
      document.removeEventListener('click', closeCalendarOutside);
    }
  }

  function formatDateShort(dateStr) {
    const months = ['ene', 'feb', 'mar', 'abr', 'may', 'jun', 'jul', 'ago', 'sep', 'oct', 'nov', 'dic'];
    const [y, m, d] = dateStr.split('-');
    return `${parseInt(d)} ${months[parseInt(m) - 1]} ${y}`;
  }

  function updateCalendarInputs() {
    const checkinEl = document.getElementById('checkinText');
    const checkoutEl = document.getElementById('checkoutText');
    const clearBtn = document.getElementById('clearDates');

    if (calStartDate) {
      checkinEl.innerText = formatDateShort(calStartDate);
      checkinEl.classList.remove('empty');
    } else {
      checkinEl.innerText = 'Añade fecha';
      checkinEl.classList.add('empty');
    }

    if (calEndDate) {
      checkoutEl.innerText = formatDateShort(calEndDate);
      checkoutEl.classList.remove('empty');
    } else {
      checkoutEl.innerText = 'Añade fecha';
      checkoutEl.classList.add('empty');
    }

    clearBtn.classList.toggle('visible', !!(calStartDate && calEndDate));
  }

  function clearDates(e) {
    e.stopPropagation();
    calStartDate = null;
    calEndDate = null;
    updateCalendarInputs();
    renderCalendar();
  }

  /* ─── Search ────────────────────────────────────────────── */
  function search() {
    const params = {
      adults: parseInt(state.adults) || 1,
      children: parseInt(state.children) || 0,
      infants: parseInt(state.infants) || 0,
      pets: parseInt(state.pets) || 0,
      sort: 'price'
    };
    if (calStartDate) params.arrival = calStartDate.replace(/-/g, '');
    if (calEndDate) params.departure = calEndDate.replace(/-/g, '');

    const url = new URL('https://alvaro--garcia.lodgify.com/es/propiedades/');
    url.search = new URLSearchParams(params).toString();
    window.open(url, '_blank');
  }
</script>

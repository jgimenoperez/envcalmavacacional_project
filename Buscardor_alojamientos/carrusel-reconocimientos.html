<style>

  .ec-date-range { display: flex; align-items: center; height: 100%; cursor: pointer; border-radius: var(--ec-radius-lg) 0 0 var(--ec-radius-lg); transition: background var(--ec-transition); padding: 0 4px; }

  .ec-clear { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--ec-border); background: var(--ec-surface); color: var(--ec-text-muted); cursor: pointer; display: none; align-items: center; justify-content: center; flex-shrink: 0; margin-right: 8px; transition: all var(--ec-transition); }
  .ec-clear.visible { display: flex; background: #fee2e2; border-color: #f87171; color: #ef4444; transform: scale(1.1); }
  .ec-calendar-dropdown { display: none; position: absolute; top: calc(100% + 10px); left: 0; background: var(--ec-surface); border-radius: var(--ec-radius-lg); box-shadow: var(--ec-shadow-lg); border: 1px solid var(--ec-border); padding: 20px 24px 24px; z-index: 100; min-width: 340px; }
  .ec-calendar-dropdown.active { display: block; animation: ec-fade-in 0.15s ease; }
  @keyframes ec-fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .cal-nav-btn { background: var(--ec-surface); border: 1px solid var(--ec-border); border-radius: var(--ec-radius-sm); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--ec-text-secondary); transition: all var(--ec-transition); flex-shrink: 0; box-shadow: var(--ec-shadow-sm); }
  .cal-nav-btn:hover { background: var(--ec-brand); border-color: var(--ec-brand); color: var(--ec-accent-text); }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; text-align: center; }

  .cal-day { padding: 0; font-size: 13px; font-weight: 400; cursor: pointer; border-radius: var(--ec-radius-sm); transition: all var(--ec-transition); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; color: var(--ec-text-primary); }
  .cal-day.empty { cursor: default; } .cal-day.disabled { color: var(--ec-text-placeholder); cursor: not-allowed; }
  .cal-day.selected, .cal-day.range-start, .cal-day.range-end { background: var(--ec-brand) !important; color: #fff !important; font-weight: 700; }
  .cal-day.in-range { background: var(--ec-brand-pale); color: var(--ec-brand); border-radius: 0; }
  .cal-day:not(.empty):not(.disabled):not(.selected):not(.in-range):not(.range-start):not(.range-end):hover { background: var(--ec-brand-pale); color: var(--ec-brand); font-weight: 600; }

  .ec-guests-input:hover { background: var(--ec-surface-alt); }
  .ec-chevron { color: var(--ec-text-muted); margin-left: auto; flex-shrink: 0; transition: transform var(--ec-transition); }
  .ec-guests-input.open .ec-chevron { transform: rotate(180deg); }
  .ec-guests-dropdown { display: none; position: absolute; top: calc(100% + 10px); left: 0; width: 100%; min-width: 280px; background: var(--ec-surface); border-radius: var(--ec-radius-lg); box-shadow: var(--ec-shadow-lg); border: 1px solid var(--ec-border); padding: 20px; z-index: 100; }
  .ec-guests-dropdown.open { display: block; }
  .ec-guest-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--ec-border); gap: 12px; }
  .ec-guest-row--last { border-bottom: none; padding-bottom: 16px; }
  .ec-guest-info { display: flex; flex-direction: column; gap: 2px; }
  .ec-guest-name { font-size: 14px; font-weight: 600; color: var(--ec-text-primary); }
  .ec-guest-desc { font-size: 11px; color: var(--ec-text-muted); }
  .ec-counter { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .ec-counter-btn { width: 32px; height: 32px; border: 1.5px solid var(--ec-border); border-radius: 50%; background: var(--ec-surface); color: var(--ec-text-primary); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all var(--ec-transition); }
  .ec-counter-btn:hover { border-color: var(--ec-brand); color: var(--ec-brand); background: var(--ec-brand-pale); }
  .ec-counter-val { width: 24px; text-align: center; font-size: 15px; font-weight: 600; color: var(--ec-text-primary); }
  .ec-done { width: 100%; padding: 10px; border: 1.5px solid var(--ec-brand); border-radius: var(--ec-radius-md); background: var(--ec-brand-pale); color: var(--ec-brand); font-size: 13px; font-weight: 700; cursor: pointer; transition: all var(--ec-transition); }
  .ec-done:hover { background: var(--ec-brand); color: #fff; }
  .ec-search { background: var(--ec-accent); color: #000; border: none; padding: 0 28px; border-radius: 0 var(--ec-radius-lg) var(--ec-radius-lg) 0; cursor: pointer; font-size: 15px; font-weight: 700; white-space: nowrap; display: flex; align-items: center; gap: 8px; min-width: 120px; justify-content: center; transition: all var(--ec-transition); flex-shrink: 0; }
  .ec-search:hover { background: var(--ec-accent-hover); box-shadow: 0 4px 12px rgba(245, 166, 35, 0.35); }

  /* ─── Awards Carousel ───────────────────────────────────── */
  .ec-awards-carousel {
    margin-top: 16px; overflow: hidden;
    background: var(--ec-surface); border-radius: var(--ec-radius-md);
    border: 1px solid var(--ec-border); padding: 12px 0;
  }
  .ec-carousel-track {
    display: flex; gap: 24px; align-items: center;
    animation: ec-carousel-scroll 20s linear infinite;
    width: max-content;
  }
  .ec-carousel-track:hover { animation-play-state: paused; }
  @keyframes ec-carousel-scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ec-carousel-item {
    display: flex; align-items: center; gap: 10px;

  .ec-carousel-item:hover { border-color: var(--ec-brand); box-shadow: var(--ec-shadow-sm); }

<script>
  const state = { adults: 1, children: 0, infants: 0, pets: 0 };
  function toggleGuests() {
    const dropdown = document.getElementById('guestsDropdown'); const toggle = document.getElementById('guestsToggle');
    const isOpen = dropdown.classList.contains('open');
    if (isOpen) { dropdown.classList.remove('open'); toggle.classList.remove('open'); toggle.setAttribute('aria-expanded', 'false'); }
    else { dropdown.classList.add('open'); toggle.classList.add('open'); toggle.setAttribute('aria-expanded', 'true'); setTimeout(() => { document.addEventListener('click', closeGuestsOutside, { once: true }); }, 0); }
    updateGuestsText();
  }
  function closeGuestsOutside(e) {
    const wrapper = document.querySelector('.ec-guests');
    if (!wrapper.contains(e.target)) { document.getElementById('guestsDropdown').classList.remove('open'); document.getElementById('guestsToggle').classList.remove('open'); document.getElementById('guestsToggle').setAttribute('aria-expanded', 'false'); }
  }
  function changeGuests(type, delta) {
    if (type === 'adults' && state.adults + delta < 1) return; if (state[type] + delta < 0) return;
    state[type] += delta; document.getElementById(type).innerText = state[type]; updateGuestsText();
  }
  function updateGuestsText() {
    let t = `${state.adults} adulto${state.adults > 1 ? 's' : ''}`;
    if (state.children) t += `, ${state.children} niño${state.children > 1 ? 's' : ''}`;
    if (state.infants) t += `, ${state.infants} bebé${state.infants > 1 ? 's' : ''}`;
    document.getElementById('guestsText').innerText = t;
  }
  let calStartDate = null, calEndDate = null, calViewYear = new Date().getFullYear(), calViewMonth = new Date().getMonth();
  function toggleCalendar() {
    const dropdown = document.getElementById('calendarDropdown'); if (dropdown.classList.contains('active')) return;
    dropdown.classList.add('active'); renderCalendar(); setTimeout(() => { document.addEventListener('click', closeCalendarOutside); }, 0);
  }
  function closeCalendarOutside(e) {
    const cal = document.getElementById('calendarDropdown'); const range = document.querySelector('.ec-date-range');
    if (!cal.contains(e.target) && !range.contains(e.target)) { cal.classList.remove('active'); document.removeEventListener('click', closeCalendarOutside); }
  }
  function renderCalendar() {
    const dropdown = document.getElementById('calendarDropdown'); const isMobile = window.innerWidth <= 560; const monthCount = isMobile ? 1 : 2; const months = [];
    for (let i = 0; i < monthCount; i++) { const y = calViewYear + Math.floor((calViewMonth + i) / 12); const m = (calViewMonth + i) % 12; months.push(renderMonth(y, m)); }
    dropdown.innerHTML = `<div class="cal-header"><div class="cal-nav-btn" onclick="event.stopPropagation(); changeMonth(-1)" role="button" tabindex="0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></div><div class="cal-months">${months.join('')}</div><div class="cal-nav-btn" onclick="event.stopPropagation(); changeMonth(1)" role="button" tabindex="0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></div></div>`;
  }
  function renderMonth(year, month) {
    const names = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    let firstDay = new Date(year, month, 1).getDay(); firstDay = firstDay === 0 ? 6 : firstDay - 1;
    const daysInMonth = new Date(year, month + 1, 0).getDate(); const today = new Date(); today.setHours(0,0,0,0);
    let html = `<div class="cal-month"><div class="cal-month-title">${names[month]} ${year}</div><div class="cal-grid">`;
    ['Lu','Ma','Mi','Ju','Vi','Sa','Do'].forEach(d => html += `<div class="cal-day-header">${d}</div>`);
    for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';
    for (let day = 1; day <= daysInMonth; day++) {
      const date = new Date(year, month, day); date.setHours(0,0,0,0);
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      let classes = 'cal-day';
      if (date < today) { classes += ' disabled'; }
      else {
        if (calStartDate && calEndDate) { const start = new Date(calStartDate); start.setHours(0,0,0,0); const end = new Date(calEndDate); end.setHours(0,0,0,0); if (dateStr === calStartDate) classes += ' selected range-start'; else if (dateStr === calEndDate) classes += ' selected range-end'; else if (date > start && date < end) classes += ' in-range'; }
        else if (calStartDate && !calEndDate) { if (dateStr === calStartDate) classes += ' selected'; }
      }
      const clickAttr = date < today ? '' : `onclick="event.stopPropagation(); selectDate('${dateStr}')"`;
      html += `<div class="${classes}" ${clickAttr}>${day}</div>`;
    }
    html += '</div></div>'; return html;
  }

  function search() {
